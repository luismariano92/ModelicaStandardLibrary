name: ReSim CI

on:
  workflow_dispatch:
  pull_request_target:


env:
    EVENT_NUMBER:  ${{ github.event.number }}
    PR_SHA: ${{ github.event.pull_request.base.sha }}
    WORKSPACE: ${{ github.workspace }}
jobs:
  run:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/matthiasbschaefer/om_image:latest
      credentials:
        username: ${{ secrets.GHCR_USER }}
        password: ${{ secrets.GHCR_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Run script
        run: python /work/run_script/OM_pr_compare_local.py $ {{ env.PR_SHA }} ${{ env.EVENT_NUMBER }} Modelica ${{ env.WORKSPACE }}








