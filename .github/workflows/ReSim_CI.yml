name: ReSim CI

on:
  workflow_dispatch:
  pull_request_target:


env:
    EVENT_NUMBER:  ${{ github.event.number }}
    PR_SHA: ${{ github.event.pull_request.base.sha }}
    WORKSPACE: ${{ github.workspace }}
jobs:
  run:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/matthiasbschaefer/om_image:latest
      options: --user root
      credentials:
        username: ${{ secrets.GHCR_USER }}
        password: ${{ secrets.GHCR_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with: 
            persist-credentials: false
      - name: Run script
        run: python /work/run_scripts/OM_PR_compare_local.py ${{ env.PR_SHA }} ${{ env.EVENT_NUMBER }} Modelica ${{ env.WORKSPACE }}
      - name: Copy back
        run: scp -r /work/resim_output/PRs/PR_${{ env.EVENT_NUMBER }}_/Modelica resimuser@212.227.63.234:/home/resimuser/regression_testing/docker/work/reports/PR_${{ env.EVENT_NUMBER }}_/Modelica